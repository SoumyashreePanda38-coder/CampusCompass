<div class="login-container">

  <div class="login-card">

    <div class="header">

      <h1>CampusCompass</h1>

      <p class="tagline">
        More Than a CGPA.
      </p>

      <h2>Welcome Back 👋</h2>

      <p class="subtitle">
        Continue your academic and career journey.
      </p>

    </div>

    <form (ngSubmit)="login()">

      <div class="form-group">

        <label>Email or Phone Number</label>

        <input
          type="text"
          placeholder="Enter email or phone number"
          [(ngModel)]="email"
          name="email">

      </div>

      <div class="form-group">

        <label>Password</label>

       <input
type="password"
placeholder="Enter password"
[(ngModel)]="password"
name="password">
      </div>

      <div class="options">

        <label class="remember">

          <input type="checkbox">

          Remember Me

        </label>

        <a href="#">Forgot Password?</a>

      </div>

      <button
        type="submit"
        class="login-btn">

        Login

      </button>

    </form>

    <div class="signup-link">

      Don't have an account?

      <a routerLink="/signup">
        Create Account
      </a>

    </div>

  </div>

</div>
