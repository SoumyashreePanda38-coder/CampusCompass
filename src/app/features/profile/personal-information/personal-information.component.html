<div class="info-container">

  <div class="info-card">

    <h1>👤 Personal Information</h1>

    <div class="info-row">

      <label>Full Name</label>

      <span>{{user.name}}</span>

    </div>

    <div class="info-row">

      <label>Email</label>

      <span>{{user.email}}</span>

    </div>

    <div class="info-row">

      <label>Phone Number</label>

      <span>{{user.phone}}</span>

    </div>

    <div class="info-row">

      <label>Address</label>

      <span>{{user.address || 'Not Added'}}</span>

    </div>

    <button class="edit-btn">

      Edit Profile

    </button>

  </div>

</div>
